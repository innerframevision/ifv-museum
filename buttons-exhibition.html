<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inner Frame Button Frames</title>

<style>

html,body{
margin:0;
min-height:100%;
background:linear-gradient(to bottom,#666666 0%,#000000 45%,#000000 100%);
font-family:Arial,sans-serif;
color:#b8924f;
}

body{
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
width:60px;
margin-top:60px;
}

h1{
font-size:42px;
letter-spacing:8px;
font-weight:normal;
margin:35px 0 10px;
}

.subtitle{
letter-spacing:10px;
margin-bottom:60px;
}

.gallery{
width:80%;
max-width:1100px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
margin-bottom:80px;
}

.gallery video{
width:100%;
display:block;
border:3px solid #7c5a2f;
background:#111;
}

@media(max-width:800px){

.gallery{
grid-template-columns:1fr;
}

h1{
font-size:28px;
}

}

</style>

</head>

<body>

<img src="Logo.jpeg" class="logo">

<h1>INNER FRAME VISION</h1>

<div class="subtitle">
INNER BUTTON FRAMES
</div>

<div class="gallery">

<video controls controlsList="nodownload" disablePictureInPicture>
<source src="Inner Frame Button 1.mp4" type="video/mp4">
</video>

<video controls controlsList="nodownload" disablePictureInPicture>
<source src="Inner Frame Button 2.mp4" type="video/mp4">
</video>

<video controls controlsList="nodownload" disablePictureInPicture>
<source src="Inner Frame Button 3.mp4" type="video/mp4">
</video>

<video controls controlsList="nodownload" disablePictureInPicture>
<source src="Inner Frame Button 4.mp4" type="video/mp4">
</video>

<video controls controlsList="nodownload" disablePictureInPicture>
<source src="Inner Frame Button 5.mp4" type="video/mp4">
</video>

<video controls controlsList="nodownload" disablePictureInPicture>
<source src="Inner Frame Button 6.mp4" type="video/mp4">
</video>

</div>

</body>
</html>
